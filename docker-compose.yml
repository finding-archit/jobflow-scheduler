version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: jobflow-postgres
    environment:
      POSTGRES_USER: jobflow
      POSTGRES_PASSWORD: jobflow
      POSTGRES_DB: jobflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: jobflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  # ── API Server ──────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobflow-api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://jobflow:jobflow@postgres:5432/jobflow
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-in-production-at-least-32-chars
      PORT: 3001
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: sh -c "npx prisma migrate deploy && npm start"

  # ── Worker ──────────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobflow-worker
    environment:
      DATABASE_URL: postgresql://jobflow:jobflow@postgres:5432/jobflow
      REDIS_URL: redis://redis:6379
      WORKER_CONCURRENCY: 5
      WORKER_POLL_INTERVAL_MS: 1000
      WORKER_HEARTBEAT_INTERVAL_MS: 10000
      NODE_ENV: production
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    command: node dist/worker/runner.js

  # ── Cron Scheduler ──────────────────────────────────────────────────────────
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobflow-scheduler
    environment:
      DATABASE_URL: postgresql://jobflow:jobflow@postgres:5432/jobflow
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    command: node dist/worker/scheduler.js

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jobflow-frontend
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
